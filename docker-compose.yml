services:
  postgres:
    image: postgres:15
    container_name: shoppilot-postgres
    environment:
      POSTGRES_DB: shoppilot
      POSTGRES_USER: shoppilot
      POSTGRES_PASSWORD: shoppilot
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoppilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shoppilot-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
